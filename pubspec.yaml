name: my_gestor
description: "Gestor contable multiplataforma de Servicio Web PMI construido con Flutter."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  go_router: ^17.2.3
  intl: ^0.20.2
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true